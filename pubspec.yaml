name: wifremote
description: A network discovery and QoS management tool.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  upnp2: ^3.0.12
  network_info_plus: ^5.0.0
  ping_discover_network_plus: ^0.0.5
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  fl_chart: ^0.65.0
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
